# ==========================================
# Library Book Issue Management System
# ==========================================

# Server
server.port=8080

# MySQL DataSource (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Fine Configuration (INR per day overdue)
library.fine.per-day=5
# Loan period in days
library.loan.period-days=7
